name: langchain-stack

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: langchain-stack:local
    container_name: langchain-stack-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
